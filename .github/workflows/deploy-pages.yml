# Builds and publishes the repository root to GitHub Pages.
#
# `actions/configure-pages` runs with `enablement: true`, which turns Pages on
# via the API the first time this workflow runs — so a repo created from this
# template usually needs no manual Pages setup.
#
# Fallback: if your org blocks API enablement, enable it once by hand at
#   Settings -> Pages -> Build and deployment -> Source: "GitHub Actions"
# and re-run this workflow.
name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Least-privilege token; `pages`/`id-token` are required to deploy.
permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; let an in-progress run finish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages (auto-enable)
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Publish the whole repo root. index.html is the entry point;
          # .nojekyll keeps GitHub from running the content through Jekyll.
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
