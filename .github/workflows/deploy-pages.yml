# Builds and publishes the repository root to GitHub Pages.
#
# REQUIRED FIRST-TIME SETUP (one-time, per repo):
#   GitHub Settings -> Pages -> Build and deployment -> Source: "GitHub Actions"
#   Then push to main or run this workflow manually.
#
# The workflow handles all subsequent deployments automatically on every push to main.
name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Least-privilege token; `pages`/`id-token` are required to deploy.
permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; let an in-progress run finish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Publish the whole repo root. index.html is the entry point;
          # .nojekyll keeps GitHub from running the content through Jekyll.
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
